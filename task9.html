<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Button Groups</title>

  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <div class="row">
    <div class="col-md-12">

      <h3>1. Basic Button Group</h3>
      <div class="btn-group">
        <button class="btn btn-primary">Left</button>
        <button class="btn btn-primary">Middle</button>
        <button class="btn btn-primary">Right</button>
      </div>

      <hr>

      <h3>2. Button Toolbar</h3>
      <div class="btn-toolbar">
        <div class="btn-group mr-2">
          <button class="btn btn-secondary">1</button>
          <button class="btn btn-secondary">2</button>
        </div>
        <div class="btn-group mr-2">
          <button class="btn btn-secondary">3</button>
          <button class="btn btn-secondary">4</button>
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary">5</button>
        </div>
      </div>

      <hr>

      <h3>3. Vertical Button Group</h3>
      <div class="btn-group-vertical">
        <button class="btn btn-success">Top</button>
        <button class="btn btn-success">Middle</button>
        <button class="btn btn-success">Bottom</button>
      </div>

      <hr>

      <h3>4. Button Group with Dropdown</h3>
      <div class="btn-group">
        <button class="btn btn-info">Action</button>
        <button class="btn btn-info dropdown-toggle dropdown-toggle-split" data-toggle="dropdown">
        </button>
        <div class="dropdown-menu">
          <a class="dropdown-item" href="#">Option 1</a>
          <a class="dropdown-item" href="#">Option 2</a>
          <a class="dropdown-item" href="#">Option 3</a>
        </div>
      </div>

      <hr>

      <h3>5. Nested Button Group</h3>
      <div class="btn-group">
        <button class="btn btn-dark">1</button>
        <button class="btn btn-dark">2</button>

        <div class="btn-group">
          <button class="btn btn-dark dropdown-toggle" data-toggle="dropdown">
            Dropdown
          </button>
          <div class="dropdown-menu">
            <a class="dropdown-item" href="#">Sub Option 1</a>
            <a class="dropdown-item" href="#">Sub Option 2</a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
