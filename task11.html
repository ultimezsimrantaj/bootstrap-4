<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Progress Bars</title>

  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <div class="row">
    <div class="col-md-12">

      <h3>1. Basic Progress Bar</h3>
      <div class="progress mb-3">
        <div class="progress-bar" style="width: 50%"></div>
      </div>

      <hr>

      <h3>2. Striped Progress Bar</h3>
      <div class="progress mb-3">
        <div class="progress-bar progress-bar-striped bg-success" style="width: 60%"></div>
      </div>

      <hr>

      <h3>3. Animated Progress Bar</h3>
      <div class="progress mb-3">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-info" style="width: 75%"></div>
      </div>

      <hr>

      <h3>4. Progress Bar with Label</h3>
      <div class="progress mb-3">
        <div class="progress-bar bg-warning" style="width: 80%">
          80%
        </div>
      </div>

      <hr>

      <h3>5. Multiple Progress Bars</h3>
      <div class="progress">
        <div class="progress-bar bg-primary" style="width: 30%">30%</div>
        <div class="progress-bar bg-success" style="width: 20%">20%</div>
        <div class="progress-bar bg-danger" style="width: 10%">10%</div>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
